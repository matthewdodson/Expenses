<div id="ledger-root"></div>
<style>
  :root {
    --bg: #E7E2D6;
    --card: #F8F6F0;
    --ink: #232A2E;
    --ink-soft: #5B6168;
    --line: #D6D0C2;
    --teal: #2F6E62;
    --teal-dim: #DCE7E3;
    --amber: #C68A2E;
    --amber-dim: #F3E6CC;
    --rust: #B14C3A;
    --rust-dim: #F2DCD7;
    --sage: #5C8A5C;
    --sage-dim: #E1EAE0;
    --mono: 'IBM Plex Mono', 'Courier New', monospace;
    --sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    --disp: 'Space Grotesk', 'Inter', sans-serif;
  }

  #ledger-root * { box-sizing: border-box; }
  #ledger-root {
    font-family: var(--sans);
    color: var(--ink);
    background: var(--bg);
    padding: 28px 20px 60px;
    min-height: 100%;
    border-radius: 12px;
  }

  .lg-wrap { max-width: 880px; margin: 0 auto; }

  .lg-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 22px;
    border-bottom: 2px solid var(--ink);
    padding-bottom: 14px;
  }
  .lg-title {
    font-family: var(--disp);
    font-weight: 700;
    font-size: 26px;
    letter-spacing: -0.02em;
  }
  .lg-sub {
    font-size: 12px;
    color: var(--ink-soft);
    font-family: var(--mono);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .lg-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 26px;
  }
  .lg-stat {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 14px 16px;
  }
  .lg-stat-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--ink-soft);
    margin-bottom: 6px;
  }
  .lg-stat-value {
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 600;
  }
  .lg-stat-value.amber { color: var(--amber); }
  .lg-stat-value.teal { color: var(--teal); }

  .lg-section-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: 28px 0 12px;
  }
  .lg-section-title {
    font-family: var(--disp);
    font-weight: 600;
    font-size: 16px;
  }

  .lg-btn {
    font-family: var(--sans);
    font-weight: 600;
    font-size: 13px;
    border: none;
    border-radius: 7px;
    padding: 9px 16px;
    cursor: pointer;
    transition: transform 0.08s ease, opacity 0.15s ease;
  }
  .lg-btn:active { transform: scale(0.97); }
  .lg-btn-primary { background: var(--teal); color: #fff; }
  .lg-btn-primary:hover { opacity: 0.9; }
  .lg-btn-ghost { background: transparent; color: var(--ink-soft); border: 1px solid var(--line); }
  .lg-btn-ghost:hover { background: var(--card); }
  .lg-btn-text {
    background: none; border: none; color: var(--teal); font-weight: 600;
    font-size: 13px; cursor: pointer; padding: 0;
  }

  .lg-form {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 18px;
    margin-bottom: 22px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .lg-form.hidden { display: none; }
  .lg-field { display: flex; flex-direction: column; gap: 5px; }
  .lg-field.full { grid-column: 1 / -1; }
  .lg-field label {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--ink-soft); font-weight: 600;
  }
  .lg-field input, .lg-field select, .lg-field textarea {
    font-family: var(--sans);
    font-size: 14px;
    padding: 9px 10px;
    border: 1px solid var(--line);
    border-radius: 7px;
    background: #fff;
    color: var(--ink);
  }
  .lg-field input:focus, .lg-field select:focus, .lg-field textarea:focus {
    outline: 2px solid var(--teal);
    outline-offset: 1px;
  }
  .lg-form-actions {
    grid-column: 1 / -1;
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    margin-top: 4px;
  }

  .lg-empty {
    background: var(--card);
    border: 1px dashed var(--line);
    border-radius: 12px;
    padding: 36px 20px;
    text-align: center;
    color: var(--ink-soft);
  }
  .lg-empty strong { color: var(--ink); display: block; margin-bottom: 4px; font-family: var(--disp); }

  .lg-list { display: flex; flex-direction: column; gap: 8px; }
  .lg-row {
    background: var(--card);
    border: 1px solid var(--line);
    border-left: 4px solid var(--ink-soft);
    border-radius: 8px;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .lg-row.status-overdue { border-left-color: var(--rust); }
  .lg-row.status-soon { border-left-color: var(--amber); }
  .lg-row.status-ok { border-left-color: var(--sage); }

  .lg-row-main { flex: 1; min-width: 0; }
  .lg-row-name { font-weight: 600; font-size: 14.5px; }
  .lg-row-meta {
    font-size: 12px; color: var(--ink-soft); margin-top: 2px;
    display: flex; gap: 8px; flex-wrap: wrap;
  }
  .lg-tag {
    font-family: var(--mono);
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    padding: 2px 6px;
    border-radius: 4px;
    background: var(--teal-dim);
    color: var(--teal);
  }
  .lg-row-due {
    font-family: var(--mono);
    font-size: 12px;
    white-space: nowrap;
  }
  .lg-row-due.status-overdue { color: var(--rust); }
  .lg-row-due.status-soon { color: var(--amber); }

  .lg-row-amount {
    font-family: var(--mono);
    font-size: 17px;
    font-weight: 600;
    white-space: nowrap;
    min-width: 80px;
    text-align: right;
  }
  .lg-row-actions { display: flex; gap: 6px; }
  .lg-icon-btn {
    background: none; border: 1px solid var(--line); border-radius: 6px;
    width: 30px; height: 30px; cursor: pointer; font-size: 13px;
    color: var(--ink-soft); display: flex; align-items: center; justify-content: center;
  }
  .lg-icon-btn:hover { background: #fff; color: var(--ink); }

  .lg-cats {
    display: flex; flex-direction: column; gap: 8px;
  }
  .lg-cat-bar-row { display: flex; align-items: center; gap: 10px; }
  .lg-cat-label { width: 120px; font-size: 12.5px; flex-shrink: 0; }
  .lg-cat-track {
    flex: 1; height: 8px; background: var(--line); border-radius: 4px; overflow: hidden;
  }
  .lg-cat-fill { height: 100%; background: var(--teal); border-radius: 4px; }
  .lg-cat-amount { font-family: var(--mono); font-size: 12.5px; width: 70px; text-align: right; flex-shrink: 0; }

  .lg-footer-note {
    margin-top: 30px; font-size: 11.5px; color: var(--ink-soft); text-align: center;
  }

  .lg-alert {
    border-radius: 10px;
    padding: 13px 16px;
    margin-bottom: 18px;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    font-size: 13.5px;
  }
  .lg-alert.rust { background: var(--rust-dim); border: 1px solid var(--rust); color: var(--rust); }
  .lg-alert.amber { background: var(--amber-dim); border: 1px solid var(--amber); color: var(--amber); }
  .lg-alert-icon { font-size: 16px; line-height: 1; }
  .lg-alert-body strong { display: block; font-size: 13px; margin-bottom: 3px; }
  .lg-alert-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
  .lg-alert-chip {
    font-family: var(--mono); font-size: 11.5px; background: rgba(255,255,255,0.55);
    padding: 2px 8px; border-radius: 5px;
  }

  .lg-sync-btn {
    font-family: var(--sans);
    font-size: 11.5px;
    font-weight: 600;
    border: 1px solid var(--teal);
    color: var(--teal);
    background: #fff;
    border-radius: 6px;
    padding: 5px 9px;
    cursor: pointer;
    white-space: nowrap;
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }
  .lg-sync-btn:hover { background: var(--teal-dim); }
  .lg-sync-btn.pending { opacity: 0.6; cursor: wait; }
  .lg-sync-btn.success { border-color: var(--sage); color: var(--sage); background: var(--sage-dim); }
  .lg-sync-btn.error { border-color: var(--rust); color: var(--rust); background: var(--rust-dim); }

  .lg-toolbar { display: flex; gap: 8px; align-items: center; }

  @media (max-width: 560px) {
    .lg-stats { grid-template-columns: 1fr; }
    .lg-form { grid-template-columns: 1fr; }
    .lg-row { flex-wrap: wrap; }
    .lg-row-amount { order: 3; }
  }
</style>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">

<script>
(function () {
  const e = React.createElement;
  const STORAGE_KEY = 'expenses-v1';
  const INCOME_STORAGE_KEY = 'income-v1';
  const ASSET_STORAGE_KEY = 'assets-v1';
  const SUPER_STORAGE_KEY = 'super-v1';
  const EXCLUDED_CATS_KEY = 'excluded-categories-v1';

  const CATEGORIES = ['Streaming', 'Utilities', 'Mortgage', 'Insurance', 'Subscriptions', 'Phone/Internet', 'Nonna', 'Other'];

  const CATEGORY_COLORS = {
    'Streaming': { fg: '#6B4FA0', bg: '#EDE6F5' },
    'Utilities': { fg: '#2F6E62', bg: '#DCE7E3' },
    'Mortgage': { fg: '#B14C3A', bg: '#F2DCD7' },
    'Insurance': { fg: '#2F5A8A', bg: '#DCE5F0' },
    'Subscriptions': { fg: '#C68A2E', bg: '#F3E6CC' },
    'Phone/Internet': { fg: '#5C8A5C', bg: '#E1EAE0' },
    'Nonna': { fg: '#A8447A', bg: '#F2DCE9' },
    'Other': { fg: '#5B6168', bg: '#E4E2DC' },
  };
  const DEFAULT_CATEGORY_COLOR = { fg: '#5B6168', bg: '#E4E2DC' };
  function catColor(cat) { return CATEGORY_COLORS[cat] || DEFAULT_CATEGORY_COLOR; }

  const INCOME_CATEGORIES = ['Salary', 'Investment', 'Other'];
  const INCOME_CATEGORY_COLORS = {
    'Salary': { fg: '#2F6E62', bg: '#DCE7E3' },
    'Investment': { fg: '#C68A2E', bg: '#F3E6CC' },
    'Other': { fg: '#5B6168', bg: '#E4E2DC' },
  };
  function incomeCatColor(cat) { return INCOME_CATEGORY_COLORS[cat] || DEFAULT_CATEGORY_COLOR; }

  const ASSET_CATEGORIES = ['Property', 'Investment Property', 'Shares', 'Car', 'Other'];
  const ASSET_CATEGORY_COLORS = {
    'Property': { fg: '#2F6E62', bg: '#DCE7E3' },
    'Investment Property': { fg: '#2F5A8A', bg: '#DCE5F0' },
    'Shares': { fg: '#A6831F', bg: '#F3ECD6' },
    'Car': { fg: '#C68A2E', bg: '#F3E6CC' },
    'Other': { fg: '#5B6168', bg: '#E4E2DC' },
  };
  function assetCatColor(cat) { return ASSET_CATEGORY_COLORS[cat] || DEFAULT_CATEGORY_COLOR; }

  const SHARE_CATEGORY_NAMES = ['Shares', 'Share investments'];

  async function fetchSharePrice(rawCode) {
    if (!rawCode || !rawCode.trim()) return null;
    const code = rawCode.trim().toUpperCase();
    const stooqCode = code.endsWith('.AX') ? code.slice(0, -3) + '.AU' : code;
    try {
      const res = await fetch(`https://stooq.com/q/l/?s=${encodeURIComponent(stooqCode)}&f=sd2t2ohlcv&h&e=csv`);
      if (!res.ok) return null;
      const text = await res.text();
      const lines = text.trim().split('\n');
      if (lines.length < 2) return null;
      const headers = lines[0].split(',').map(h => h.trim().toLowerCase());
      const values = lines[1].split(',');
      const closeIdx = headers.indexOf('close');
      if (closeIdx === -1) return null;
      const price = parseFloat(values[closeIdx]);
      if (isNaN(price) || price <= 0) return null;
      return price;
    } catch (_) {
      return null;
    }
  }

  const SUPER_CATEGORIES = ['Property', 'Cash', 'Share investments', 'Trilogy Monthly Income Trust', 'Other'];
  const SUPER_CATEGORY_COLORS = {
    'Property': { fg: '#2F6E62', bg: '#DCE7E3' },
    'Cash': { fg: '#5C8A5C', bg: '#E1EAE0' },
    'Share investments': { fg: '#6B4FA0', bg: '#EDE6F5' },
    'Trilogy Monthly Income Trust': { fg: '#B14C3A', bg: '#F2DCD7' },
    'Other': { fg: '#5B6168', bg: '#E4E2DC' },
  };
  function superCatColor(cat) { return SUPER_CATEGORY_COLORS[cat] || DEFAULT_CATEGORY_COLOR; }

  const PAYMENT_METHODS = ['Visa 3046', 'PayPal', 'Acct 135', 'Acct 090'];
  const FREQUENCIES = [
    { id: 'weekly', label: 'Weekly', monthsFactor: 4.33, yearlyFactor: 52 },
    { id: 'fortnightly', label: 'Fortnightly', monthsFactor: 2.167, yearlyFactor: 26 },
    { id: 'monthly', label: 'Monthly', monthsFactor: 1, yearlyFactor: 12 },
    { id: 'quarterly', label: 'Quarterly', monthsFactor: 1 / 3, yearlyFactor: 4 },
    { id: 'yearly', label: 'Yearly', monthsFactor: 1 / 12, yearlyFactor: 1 },
    { id: 'one-time', label: 'One-time', monthsFactor: 0, yearlyFactor: 0 },
  ];

  function freqMeta(id) { return FREQUENCIES.find(f => f.id === id) || FREQUENCIES[1]; }
  function uid() { return Math.random().toString(36).slice(2, 10) + Date.now().toString(36); }

  const hasClaudeStorage = typeof window.storage !== 'undefined' && window.storage && typeof window.storage.get === 'function';

  async function storageGet(key) {
    if (hasClaudeStorage) {
      try {
        const res = await window.storage.get(key, false);
        return res ? res.value : null;
      } catch (_) { return null; }
    }
    try { return localStorage.getItem(key); } catch (_) { return null; }
  }

  async function storageSet(key, value) {
    if (hasClaudeStorage) {
      try { await window.storage.set(key, value, false); return true; } catch (_) { return false; }
    }
    try { localStorage.setItem(key, value); return true; } catch (_) { return false; }
  }

  function fmtMoney(n) {
    const v = Number(n) || 0;
    return '$' + v.toLocaleString('en-AU', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }
  function parseDate(s) {
    if (!s) return null;
    const d = new Date(s + 'T00:00:00');
    return isNaN(d.getTime()) ? null : d;
  }
  function daysUntil(dateStr) {
    const d = parseDate(dateStr);
    if (!d) return null;
    const today = new Date();
    today.setHours(0,0,0,0);
    return Math.round((d - today) / 86400000);
  }
  function statusFor(dateStr, freq, autoPay) {
    if (freq === 'one-time') {
      const days = daysUntil(dateStr);
      if (days === null) return 'ok';
      if (days < 0) return 'paid';
      if (days <= 3) return 'soon';
      return 'ok';
    }
    const days = daysUntil(dateStr);
    if (days === null) return 'ok';
    if (days < 0) return autoPay ? 'ok' : 'overdue';
    if (days <= 3) return 'soon';
    return 'ok';
  }
  function advanceDate(dateStr, freqId) {
    const d = parseDate(dateStr) || new Date();
    const next = new Date(d);
    if (freqId === 'weekly') next.setDate(next.getDate() + 7);
    else if (freqId === 'fortnightly') next.setDate(next.getDate() + 14);
    else if (freqId === 'monthly') next.setMonth(next.getMonth() + 1);
    else if (freqId === 'quarterly') next.setMonth(next.getMonth() + 3);
    else if (freqId === 'yearly') next.setFullYear(next.getFullYear() + 1);
    else return dateStr;
    return next.toISOString().slice(0, 10);
  }
  function fmtDueLabel(dateStr, autoPay) {
    const days = daysUntil(dateStr);
    if (days === null) return 'Ongoing';
    if (days === 0) return autoPay ? 'Auto-charged today' : 'Due today';
    if (days === 1) return 'Due tomorrow';
    if (days > 1) return `Due in ${days}d`;
    if (autoPay) return `Auto-charged ${Math.abs(days)}d ago`;
    if (days === -1) return '1d overdue';
    return `${Math.abs(days)}d overdue`;
  }

  function App() {
    const [activeTab, setActiveTab] = React.useState('expenses');
    const [items, setItems] = React.useState([]);
    const [loaded, setLoaded] = React.useState(false);
    const [showForm, setShowForm] = React.useState(false);
    const [editingId, setEditingId] = React.useState(null);
    const [form, setForm] = React.useState(emptyForm());
    const [err, setErr] = React.useState('');
    const [syncStatus, setSyncStatus] = React.useState({});
    const [syncAllStatus, setSyncAllStatus] = React.useState('idle');
    const [restoreMsg, setRestoreMsg] = React.useState('');
    const fileInputRef = React.useRef(null);
    const [autoPayFilter, setAutoPayFilter] = React.useState('all');
    const [categoryFilter, setCategoryFilter] = React.useState('all');
    const [paymentMethodFilter, setPaymentMethodFilter] = React.useState('all');
    const [viewMode, setViewMode] = React.useState('monthly');
    const [excludedCats, setExcludedCats] = React.useState([]);
    const [showTotalSettings, setShowTotalSettings] = React.useState(false);

    const [incomeItems, setIncomeItems] = React.useState([]);
    const [showIncomeForm, setShowIncomeForm] = React.useState(false);
    const [editingIncomeId, setEditingIncomeId] = React.useState(null);
    const [incomeForm, setIncomeForm] = React.useState(emptyIncomeForm());
    const [incomeErr, setIncomeErr] = React.useState('');

    const [assetItems, setAssetItems] = React.useState([]);
    const [showAssetForm, setShowAssetForm] = React.useState(false);
    const [editingAssetId, setEditingAssetId] = React.useState(null);
    const [assetForm, setAssetForm] = React.useState(emptyAssetForm());
    const [assetErr, setAssetErr] = React.useState('');
    const [assetPriceStatus, setAssetPriceStatus] = React.useState('idle');
    const [assetPreviewPrice, setAssetPreviewPrice] = React.useState(null);
    const [assetRowPriceStatus, setAssetRowPriceStatus] = React.useState({});

    const [superItems, setSuperItems] = React.useState([]);
    const [showSuperForm, setShowSuperForm] = React.useState(false);
    const [editingSuperId, setEditingSuperId] = React.useState(null);
    const [superForm, setSuperForm] = React.useState(emptySuperForm());
    const [superErr, setSuperErr] = React.useState('');
    const [superPriceStatus, setSuperPriceStatus] = React.useState('idle');
    const [superPreviewPrice, setSuperPreviewPrice] = React.useState(null);
    const [superRowPriceStatus, setSuperRowPriceStatus] = React.useState({});

    function emptyForm() {
      return {
        name: '', amount: '', category: CATEGORIES[0], frequency: 'monthly',
        hasDueDate: true, dueDate: new Date().toISOString().slice(0, 10),
        paymentMethod: '', notes: '', autoPay: false
      };
    }

    function emptyIncomeForm() {
      return { name: '', amount: '', category: INCOME_CATEGORIES[0], frequency: 'monthly', paymentMethod: '', notes: '' };
    }

    function emptyAssetForm() {
      return { name: '', value: '', category: ASSET_CATEGORIES[0], mortgage: '', offset: '', shareCode: '', notes: '' };
    }

    function emptySuperForm() {
      return { name: '', value: '', category: SUPER_CATEGORIES[0], shareCode: '', notes: '' };
    }

    React.useEffect(() => {
      (async () => {
        const value = await storageGet(STORAGE_KEY);
        if (value) {
          try {
            const parsed = JSON.parse(value);
            const CATEGORY_MIGRATIONS = { 'Rent/Mortgage': 'Mortgage', 'Loan': 'Other' };
            let migrated = false;
            const fixed = parsed.map(it => {
              if (CATEGORY_MIGRATIONS[it.category]) {
                migrated = true;
                return { ...it, category: CATEGORY_MIGRATIONS[it.category] };
              }
              return it;
            });
            setItems(fixed);
            if (migrated) await storageSet(STORAGE_KEY, JSON.stringify(fixed));
          } catch (_) { /* corrupt data, ignore */ }
        }
        const incomeValue = await storageGet(INCOME_STORAGE_KEY);
        if (incomeValue) {
          try {
            const parsedIncome = JSON.parse(incomeValue);
            const INCOME_CATEGORY_MIGRATIONS = { 'Freelance': 'Other', 'Government/Benefits': 'Other', 'Gift': 'Other' };
            let incomeMigrated = false;
            const fixedIncome = parsedIncome.map(it => {
              if (INCOME_CATEGORY_MIGRATIONS[it.category]) {
                incomeMigrated = true;
                return { ...it, category: INCOME_CATEGORY_MIGRATIONS[it.category] };
              }
              return it;
            });
            setIncomeItems(fixedIncome);
            if (incomeMigrated) await storageSet(INCOME_STORAGE_KEY, JSON.stringify(fixedIncome));
          } catch (_) { /* corrupt data, ignore */ }
        }
        const excludedRaw = await storageGet(EXCLUDED_CATS_KEY);
        if (excludedRaw) {
          try { setExcludedCats(JSON.parse(excludedRaw)); } catch (_) { /* ignore */ }
        }
        const assetValue = await storageGet(ASSET_STORAGE_KEY);
        if (assetValue) {
          try { setAssetItems(JSON.parse(assetValue)); } catch (_) { /* corrupt data, ignore */ }
        }
        const superValue = await storageGet(SUPER_STORAGE_KEY);
        if (superValue) {
          try { setSuperItems(JSON.parse(superValue)); } catch (_) { /* corrupt data, ignore */ }
        }
        setLoaded(true);
      })();
    }, []);

    async function persistIncome(next) {
      setIncomeItems(next);
      await storageSet(INCOME_STORAGE_KEY, JSON.stringify(next));
    }

    function openAddIncome() {
      setIncomeForm(emptyIncomeForm());
      setEditingIncomeId(null);
      setIncomeErr('');
      setShowIncomeForm(true);
    }
    function openEditIncome(item) {
      setIncomeForm({
        name: item.name, amount: String(item.amount), category: item.category,
        frequency: item.frequency, paymentMethod: item.paymentMethod || '', notes: item.notes || ''
      });
      setEditingIncomeId(item.id);

    function recurrenceText(freq) {
      if (freq === 'weekly') return 'repeating weekly, every 7 days';
      if (freq === 'fortnightly') return 'repeating every 2 weeks (14 days)';
      if (freq === 'monthly') return 'repeating monthly on the same day of the month';
      if (freq === 'quarterly') return 'repeating every 3 months on the same day';
      if (freq === 'yearly') return 'repeating yearly on the same date';
      return 'a single one-off event, not recurring';
    }

    async function syncToCalendar(item) {
      setSyncStatus(s => ({ ...s, [item.id]: 'pending' }));
      try {
        const prompt = `Create a Google Calendar event for a bill/subscription payment reminder, using the create_event tool. ` +
          `Title: "${item.name} due (${fmtMoney(item.amount)})". ` +
          `Date: ${item.dueDate}, set as an all-day event or at 9:00am local time. ` +
          `Description: Category: ${item.category}. Amount: ${fmtMoney(item.amount)}. Payment method: ${item.paymentMethod || 'not specified'}. Notes: ${item.notes || 'none'}. ` +
          `Add a reminder/notification set for 1 day before the event. ` +
          `This event should be ${recurrenceText(item.frequency)}. ` +
          `After creating it, reply with a short confirmation only.`;
        const res = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: 'claude-sonnet-4-6',
            max_tokens: 1000,
            messages: [{ role: 'user', content: prompt }],
            mcp_servers: [{ type: 'url', url: 'https://calendarmcp.googleapis.com/mcp/v1', name: 'google-calendar' }]
          })
        });
        const data = await res.json();
        const toolResults = (data.content || []).filter(c => c.type === 'mcp_tool_result');
        const toolUses = (data.content || []).filter(c => c.type === 'mcp_tool_use' && c.name === 'create_event');
        if (toolUses.length > 0 && toolResults.length > 0) {
          setSyncStatus(s => ({ ...s, [item.id]: 'success' }));
        } else {
          setSyncStatus(s => ({ ...s, [item.id]: 'error' }));
        }
      } catch (e) {
        setSyncStatus(s => ({ ...s, [item.id]: 'error' }));
      }
    }

    async function syncAllToCalendar() {
      setSyncAllStatus('pending');
      const upcoming = items.filter(it => {
        const d = daysUntil(it.dueDate);
        return d !== null && d >= -3;

      for (const it of upcoming) {

    function exportBackup() {
      const payload = {
        exportedAt: new Date().toISOString(),
        source: 'Ledger app',
        expenses: items,
        income: incomeItems,
        assets: assetItems,
        super: superItems
      };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      const stamp = new Date().toISOString().slice(0, 10);
      a.href = url;
      a.download = `ledger-backup-${stamp}.json`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function handleRestoreFile(ev) {
      const file = ev.target.files && ev.target.files[0];
      ev.target.value = '';
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const parsed = JSON.parse(reader.result);
          const list = Array.isArray(parsed) ? parsed : parsed.expenses;
          const incomeList = Array.isArray(parsed) ? [] : (parsed.income || []);
          const assetList = Array.isArray(parsed) ? [] : (parsed.assets || []);
          const superList = Array.isArray(parsed) ? [] : (parsed.super || []);
          if (!Array.isArray(list)) { setRestoreMsg('error:Not a valid backup file.'); return; }
          const valid = list.every(it => it && typeof it.name === 'string' && typeof it.amount === 'number');
          const incomeValid = Array.isArray(incomeList) && incomeList.every(it => it && typeof it.name === 'string' && typeof it.amount === 'number');
          const assetValid = Array.isArray(assetList) && assetList.every(it => it && typeof it.name === 'string' && typeof it.value === 'number');
          const superValid = Array.isArray(superList) && superList.every(it => it && typeof it.name === 'string' && typeof it.value === 'number');
          if (!valid || !incomeValid || !assetValid || !superValid) { setRestoreMsg('error:File format not recognized.'); return; }
          const confirmReplace = window.confirm(`Restore ${list.length} expense(s), ${incomeList.length} income source(s), ${assetList.length} asset(s), and ${superList.length} super holding(s) from this backup? This will replace what's currently in the app.`);
          if (!confirmReplace) return;
          const withIds = list.map(it => ({ ...it, id: it.id || uid() }));
          const incomeWithIds = incomeList.map(it => ({ ...it, id: it.id || uid() }));
          const assetWithIds = assetList.map(it => ({ ...it, id: it.id || uid() }));
          const superWithIds = superList.map(it => ({ ...it, id: it.id || uid() }));
          persist(withIds);
          persistIncome(incomeWithIds);
          persistAssets(assetWithIds);
          persistSuper(superWithIds);
          setRestoreMsg('success:Restored ' + list.length + ' expense(s), ' + incomeList.length + ' income source(s), ' + assetList.length + ' asset(s), and ' + superList.length + ' super holding(s).');
        } catch (e) {
          setRestoreMsg('error:Could not read that file.');
        }
        setTimeout(() => setRestoreMsg(''), 4000);
      };
      reader.readAsText(file);
    }

    // Derived stats
    function periodFactor(freqId) {
      const f = freqMeta(freqId);
      return viewMode === 'yearly' ? f.yearlyFactor : f.monthsFactor;
    }
    const periodTotal = items
      .filter(it => !excludedCats.includes(it.category))

    const dueThisWeek = items.filter(it => {

    });

    const catTotals = {};

      const eq = it.amount * periodFactor(it.frequency);
      catTotals[it.category] = (catTotals[it.category] || 0) + eq;
    });
    const catList = Object.entries(catTotals).sort((a, b) => b[1] - a[1]);
    const maxCat = catList.length ? catList[0][1] : 1;

    const sorted = [...items].sort((a, b) => {

    incomeItems.forEach(it => {

    });
    const incomeCatList = Object.entries(incomeCatTotals).sort((a, b) => b[1] - a[1]);
    const maxIncomeCat = incomeCatList.length ? incomeCatList[0][1] : 1;
    const sortedIncome = [...incomeItems].sort((a, b) => b.amount * periodFactor(b.frequency) - a.amount * periodFactor(a.frequency));
    const netTotal = incomePeriodTotal - periodTotal;

    const assetGrossTotal = assetItems.reduce((sum, it) => sum + it.value, 0);
    const assetMortgageTotal = assetItems.reduce((sum, it) => sum + (it.mortgage || 0), 0);
    const assetOffsetTotal = assetItems.reduce((sum, it) => sum + (it.offset || 0), 0);
    const assetTotal = assetGrossTotal - assetMortgageTotal + assetOffsetTotal;
    const assetCatTotals = {};
    assetItems.forEach(it => { assetCatTotals[it.category] = (assetCatTotals[it.category] || 0) + (it.value - (it.mortgage || 0) + (it.offset || 0)); });
    const assetCatList = Object.entries(assetCatTotals).sort((a, b) => b[1] - a[1]);
    const maxAssetCat = assetCatList.length ? Math.max(...assetCatList.map(c => Math.abs(c[1])), 1) : 1;
    const sortedAssets = [...assetItems].sort((a, b) => b.value - a.value);

    const superTotal = superItems.reduce((sum, it) => sum + it.value, 0);

    superItems.forEach(it => { superCatTotals[it.category] = (superCatTotals[it.category] || 0) + it.value; });
    const superCatList = Object.entries(superCatTotals).sort((a, b) => b[1] - a[1]);
    const maxSuperCat = superCatList.length ? superCatList[0][1] : 1;
    const sortedSuper = [...superItems].sort((a, b) => b.value - a.value);

    const netWorth = assetTotal + superTotal;

                  e('div', { className: 'lg-row-amount', style: { color: equity < 0 ? 'var(--rust)' : 'inherit' } },
                    fmtMoney(equity),
                    (hasMortgage || hasOffset) && e('div', { style: { fontSize: 10.5, color: 'var(--ink-soft)', fontWeight: 400, textAlign: 'right' } }, 'net equity')
                  ),
                  e('div', { className: 'lg-row-actions' },
                    e('button', { className: 'lg-icon-btn', title: 'Edit', onClick: () => openEditAsset(it) }, '✎'),
                    e('button', { className: 'lg-icon-btn', title: 'Delete', onClick: () => removeAsset(it.id) }, '✕')
                  )
                );
              })
            )

      ), // end assets tab fragment

      activeTab === 'super' && e(React.Fragment, null,

        showSuperForm && e('form', { className: 'lg-form', onSubmit: submitSuper },
          superErr && e('div', { className: 'lg-field full', style: { color: 'var(--rust)', fontSize: 12.5 } }, superErr),
          e('div', { className: 'lg-field full' },
            e('label', null, 'Name'),
            e('input', { type: 'text', placeholder: 'e.g. AustralianSuper balanced option', value: superForm.name, onChange: ev => setSuperForm({ ...superForm, name: ev.target.value }) })
          ),
          e('div', { className: 'lg-field' },
            e('label', null, 'Current value (AUD)'),
            e('input', { type: 'number', step: '0.01', min: '0', placeholder: '0.00', value: superForm.value, onChange: ev => setSuperForm({ ...superForm, value: ev.target.value }) })
          ),
          e('div', { className: 'lg-field' },
            e('label', null, 'Category'),
            e('select', { value: superForm.category, onChange: ev => setSuperForm({ ...superForm, category: ev.target.value }) },
              SUPER_CATEGORIES.map(c => e('option', { key: c, value: c }, c))
            )
          ),
          SHARE_CATEGORY_NAMES.includes(superForm.category) && e('div', { className: 'lg-field full' },
            e('label', null, 'Share code (e.g. HACK.AX)'),
            e('div', { style: { display: 'flex', gap: 8 } },
              e('input', {
                type: 'text', placeholder: 'e.g. HACK.AX', style: { flex: 1 },
                value: superForm.shareCode,
                onChange: ev => { setSuperForm({ ...superForm, shareCode: ev.target.value }); setSuperPriceStatus('idle'); setSuperPreviewPrice(null); }
              }),
              e('button', {
                type: 'button', className: 'lg-btn lg-btn-ghost', style: { whiteSpace: 'nowrap' },
                disabled: superPriceStatus === 'loading' || !superForm.shareCode.trim(),
                onClick: lookupSuperPrice
              }, superPriceStatus === 'loading' ? 'Looking up…' : '🔍 Get price')
            ),
            superPriceStatus === 'success' && superPreviewPrice && e('div', { style: { fontSize: 12.5, color: 'var(--sage)', marginTop: 4 } }, `Current price: ${fmtMoney(superPreviewPrice)}`),
            superPriceStatus === 'error' && e('div', { style: { fontSize: 12.5, color: 'var(--rust)', marginTop: 4 } }, 'Couldn\u2019t find a price for that code — double check it and try again.')
          ),
          e('div', { className: 'lg-field full' },
            e('label', null, 'Notes'),
            e('textarea', { rows: 2, placeholder: 'Optional', value: superForm.notes, onChange: ev => setSuperForm({ ...superForm, notes: ev.target.value }) })
          ),
          e('div', { className: 'lg-form-actions' },
            e('button', { type: 'button', className: 'lg-btn lg-btn-ghost', onClick: closeSuperForm }, 'Cancel'),
            e('button', { type: 'submit', className: 'lg-btn lg-btn-primary' }, editingSuperId ? 'Save changes' : 'Add super holding')
          )
        ),

        superCatList.length > 0 && e('div', null,
          e('div', { className: 'lg-section-head' }, e('div', { className: 'lg-section-title' }, 'By category')),
          e('div', { className: 'lg-cats' },
            superCatList.map(([cat, total]) =>
              e('div', { className: 'lg-cat-bar-row', key: cat },
                e('div', { className: 'lg-cat-label', style: { color: superCatColor(cat).fg, fontWeight: 600 } }, cat),
                e('div', { className: 'lg-cat-track' }, e('div', { className: 'lg-cat-fill', style: { width: (total / maxSuperCat * 100) + '%', background: superCatColor(cat).fg } })),
                e('div', { className: 'lg-cat-amount' }, fmtMoney(total))
              )
            )
          )
        ),

        e('div', { className: 'lg-section-head' }, e('div', { className: 'lg-section-title' }, 'All super holdings')),

        sortedSuper.length === 0
          ? e('div', { className: 'lg-empty' },
              e('strong', null, 'No super holdings tracked yet'),
              'Add your super fund\u2019s investment allocation to see the full breakdown.'
            )
          : e('div', { className: 'lg-list' },
              sortedSuper.map(it =>
                e('div', { className: 'lg-row', key: it.id, style: { borderLeftColor: superCatColor(it.category).fg } },
                  e('div', { className: 'lg-row-main' },
                    e('div', { className: 'lg-row-name' }, it.name),
                    e('div', { className: 'lg-row-meta' },
                      e('span', { className: 'lg-tag', style: { background: superCatColor(it.category).bg, color: superCatColor(it.category).fg } }, it.category)
                    ),
                    it.shareCode && e('div', { className: 'lg-row-meta', style: { marginTop: 4 } },
                      e('span', { className: 'lg-tag', style: { background: 'var(--teal-dim)', color: 'var(--teal)' } }, it.shareCode),
                      it.currentPrice
                        ? e('span', null, `${fmtMoney(it.currentPrice)} as of ${new Date(it.priceUpdated).toLocaleDateString('en-AU')}`)
                        : e('span', { style: { color: 'var(--ink-soft)' } }, 'No price yet'),
                      e('button', {
                        className: 'lg-sync-btn ' + (superRowPriceStatus[it.id] || ''),
                        style: { padding: '2px 8px', fontSize: 10.5 },
                        disabled: superRowPriceStatus[it.id] === 'loading',
                        onClick: () => refreshSuperRowPrice(it)
                      }, superRowPriceStatus[it.id] === 'loading' ? '…' : superRowPriceStatus[it.id] === 'error' ? '⚠ Retry' : '🔄')
                    ),
                    it.notes && e('div', { className: 'lg-row-meta', style: { marginTop: 4, fontStyle: 'italic' } }, it.notes)
                  ),
                  e('div', { className: 'lg-row-amount' }, fmtMoney(it.value)),
                  e('div', { className: 'lg-row-actions' },
                    e('button', { className: 'lg-icon-btn', title: 'Edit', onClick: () => openEditSuper(it) }, '✎'),
                    e('button', { className: 'lg-icon-btn', title: 'Delete', onClick: () => removeSuper(it.id) }, '✕')
                  )
                )
              )
            )

      ), // end super tab fragment

      e('div', { className: 'lg-footer-note' },
        hasClaudeStorage
          ? 'Saved automatically — your data stays on this account and reloads next time you open this.'
          : 'Saved to this browser only (not synced across devices) — use Backup regularly to keep a copy safe.'
      )
    );
  }

  const root = ReactDOM.createRoot(document.getElementById('ledger-root'));
  root.render(e(App));
})();
</script>
